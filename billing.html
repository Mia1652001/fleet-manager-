<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing — Fleet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="boot" id="boot">Loading...</div>

<div id="app" style="display:none;">
  <header>
    <div class="header-top">
      <div>
        <h1>Fleet <em>Manager</em></h1>
        <div class="header-company" id="company-label">—</div>
      </div>
      <div class="header-right">
        <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Live</span></div>
        <button class="btn-logout" id="logout-btn">Sign out</button>
      </div>
    </div>
    <nav>
      <a href="index.html">Fleet</a>
      <a href="bookings.html">Bookings</a>
      <a href="customers.html">Customers</a>
      <a href="billing.html" class="active">Billing</a>
      <a href="maintenance.html">Maintenance</a>
    </nav>
  </header>

  <div class="main">
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search by customer or car...">
    </div>

    <div class="filter-row" id="filters">
      <button class="tab active" data-f="unpaid">Unpaid</button>
      <button class="tab" data-f="paid">Paid</button>
      <button class="tab" data-f="all">All</button>
    </div>

    <div class="card-list" id="invoice-list"><div class="loading-screen">Loading invoices...</div></div>
  </div>
</div>

<!-- Deposit Modal -->
<div class="overlay" id="deposit-modal">
  <div class="modal">
    <h2>Deposits</h2>
    <div class="form-error" id="deposit-error"></div>
    <div class="field">
      <label>Advance paid (reduces balance owed)</label>
      <input id="dep-advance" type="number" min="0" placeholder="e.g. 2000">
    </div>
    <div class="field">
      <label>Security deposit (refundable, held separately)</label>
      <input id="dep-security" type="number" min="0" placeholder="e.g. 5000">
    </div>
    <div style="font-size:11px;color:var(--muted);margin:-4px 0 8px;">
      Advance payment is deducted from the rental total. Security deposit is a refundable hold — mark it refunded or kept when the car comes back.
    </div>
    <div class="modal-actions">
      <button class="btn" data-close="deposit-modal">Cancel</button>
      <button class="btn-primary" id="save-deposit-btn">Save deposits</button>
    </div>
  </div>
</div>

<script type="module" src="billing.js"></script>
</body>
</html>
