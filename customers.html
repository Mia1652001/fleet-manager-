<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers — Fleet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="boot" id="boot">Loading...</div>

<div id="app" style="display:none;">
  <header>
    <div class="header-top">
      <div>
        <h1>Fleet <em>Manager</em></h1>
        <div class="header-company" id="company-label">—</div>
      </div>
      <div class="header-right">
        <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Live</span></div>
        <button class="btn-logout" id="logout-btn">Sign out</button>
      </div>
    </div>
    <nav>
      <a href="index.html">Fleet</a>
      <a href="bookings.html">Bookings</a>
      <a href="customers.html" class="active">Customers</a>
      <a href="billing.html">Billing</a>
      <a href="maintenance.html">Maintenance</a>
    </nav>
  </header>

  <div class="main">
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search name, phone, email, or license...">
      <button class="btn-primary" id="add-customer-btn">+ Add customer</button>
    </div>

    <div class="card-list" id="customer-list"><div class="loading-screen">Loading customers...</div></div>
  </div>
</div>

<!-- Add / Edit Customer Modal -->
<div class="overlay" id="customer-modal">
  <div class="modal">
    <h2 id="customer-modal-title">Add customer</h2>
    <div class="form-error" id="customer-error"></div>
    <div class="field"><label>Full name</label><input id="c-name" placeholder="e.g. Jean Martin"></div>
    <div class="field"><label>Phone</label><input id="c-phone" placeholder="e.g. 5712 3456"></div>
    <div class="field"><label>Email</label><input id="c-email" type="email" placeholder="e.g. jean@email.com"></div>
    <div class="field"><label>Driving license no.</label><input id="c-license" placeholder="e.g. MU-123456"></div>
    <div class="field"><label>Notes</label><input id="c-notes" placeholder="e.g. prefers automatic"></div>
    <div class="modal-actions">
      <button class="btn" data-close="customer-modal">Cancel</button>
      <button class="btn-primary" id="save-customer-btn">Save</button>
    </div>
  </div>
</div>

<!-- History Modal -->
<div class="overlay" id="history-modal">
  <div class="modal">
    <h2 id="history-title">Rental history</h2>
    <div class="card-list" id="history-list"></div>
    <div class="modal-actions">
      <button class="btn" data-close="history-modal">Close</button>
    </div>
  </div>
</div>

<script type="module" src="customers.js"></script>
</body>
</html>
