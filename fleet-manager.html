<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2eb;
    --surface: #ffffff;
    --border: #e0dbd0;
    --text: #1a1814;
    --muted: #7a7568;
    --accent: #1a1814;
    --green-bg: #e8f4e8;
    --green-text: #2d6a2d;
    --amber-bg: #fdf3dc;
    --amber-text: #8a5c00;
    --red-bg: #fdeaea;
    --red-text: #8a2020;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--text);
    color: var(--bg);
    padding: 2rem 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  header h1 em {
    font-style: italic;
    font-weight: 300;
  }

  .header-sub {
    font-size: 11px;
    color: #9a9080;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sync-status {
    font-size: 11px;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #9a9080;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #5a9a5a;
    flex-shrink: 0;
  }

  .sync-dot.loading { background: #c8a030; animation: pulse 1s infinite; }
  .sync-dot.error { background: #c03030; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.2rem 1.4rem;
    border-radius: 4px;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-val {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem;
    font-weight: 300;
    line-height: 1;
  }

  .stat-val.green { color: var(--green-text); }
  .stat-val.amber { color: var(--amber-text); }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  input[type="text"], select {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"] { flex: 1; min-width: 180px; }
  input[type="text"]:focus, select:focus { border-color: var(--text); }

  .btn-primary {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    padding: 8px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.82; }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 1.2rem;
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 14px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .tab:hover { border-color: var(--text); color: var(--text); }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .car-list { display: flex; flex-direction: column; gap: 8px; }

  .car-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    border-left: 3px solid var(--border);
    transition: border-color 0.15s;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .car-card.available { border-left-color: var(--green-text); }
  .car-card.rented { border-left-color: var(--amber-text); }

  .car-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .car-name {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 400;
  }

  .car-plate {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
  }

  .badge.available { background: var(--green-bg); color: var(--green-text); }
  .badge.rented { background: var(--amber-bg); color: var(--amber-text); }

  .car-details {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }

  .car-details strong { color: var(--text); }

  .car-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
  }

  .btn:hover { border-color: var(--text); background: var(--bg); }
  .btn.danger { color: var(--red-text); border-color: #f0c0c0; }
  .btn.danger:hover { background: var(--red-bg); }

  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,24,20,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
    padding: 2rem;
    width: 380px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 300;
    margin-bottom: 1.5rem;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .field input {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    outline: none;
  }

  .field input:focus { border-color: var(--text); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  .loading-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Fleet <em>Manager</em></h1>
    <div class="header-sub">Rental Car Management System</div>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Connecting...</span>
  </div>
</header>

<div class="main">
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val">—</div></div>
    <div class="stat"><div class="stat-label">Available</div><div class="stat-val green">—</div></div>
    <div class="stat"><div class="stat-label">Rented</div><div class="stat-val amber">—</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search car, plate, or renter..." oninput="render()">
    <select id="sortBy" onchange="render()">
      <option value="name">Sort: Name</option>
      <option value="status">Sort: Status</option>
      <option value="return">Sort: Return date</option>
    </select>
    <button class="btn-primary" onclick="openAddModal()">+ Add car</button>
  </div>

  <div class="filter-row">
    <button class="tab active" onclick="setFilter('all',this)">All</button>
    <button class="tab" onclick="setFilter('available',this)">Available</button>
    <button class="tab" onclick="setFilter('rented',this)">Rented</button>
  </div>

  <div class="car-list" id="car-list">
    <div class="loading-screen">Loading fleet data...</div>
  </div>
</div>

<!-- Add Car Modal -->
<div class="overlay" id="add-modal">
  <div class="modal">
    <h2>Add new car</h2>
    <div class="field"><label>Make</label><input id="a-make" placeholder="e.g. Toyota"></div>
    <div class="field"><label>Model</label><input id="a-model" placeholder="e.g. Corolla"></div>
    <div class="field"><label>Year</label><input id="a-year" placeholder="e.g. 2023" type="number"></div>
    <div class="field"><label>Plate number</label><input id="a-plate" placeholder="e.g. ABC-1234"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn-primary" onclick="addCar()">Add car</button>
    </div>
  </div>
</div>

<!-- Rent Modal -->
<div class="overlay" id="rent-modal">
  <div class="modal">
    <h2>Rent out car</h2>
    <div class="field"><label>Renter name</label><input id="r-name" placeholder="Full name"></div>
    <div class="field"><label>Phone number</label><input id="r-phone" placeholder="e.g. 5712 3456"></div>
    <div class="field"><label>Return date</label><input id="r-date" type="date"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('rent-modal')">Cancel</button>
      <button class="btn-primary" onclick="confirmRent()">Confirm rental</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDgNxoaK9q3nxKKV7vg2pIzmtLFPDl5Lkk",
    authDomain: "car-rental-system-2a93b.firebaseapp.com",
    projectId: "car-rental-system-2a93b",
    storageBucket: "car-rental-system-2a93b.firebasestorage.app",
    messagingSenderId: "373289375853",
    appId: "1:373289375853:web:2246358765e53a04924764"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const carsCol = collection(db, "cars");

  let cars = [];
  let filter = 'all';
  let rentingId = null;

  function setSynced() {
    document.getElementById('sync-dot').className = 'sync-dot';
    document.getElementById('sync-label').textContent = 'Live — ' + new Date().toLocaleTimeString();
  }

  function setLoading() {
    document.getElementById('sync-dot').className = 'sync-dot loading';
    document.getElementById('sync-label').textContent = 'Saving...';
  }

  // Real-time listener
  onSnapshot(carsCol, (snapshot) => {
    cars = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    setSynced();
    render();
  }, (err) => {
    document.getElementById('sync-dot').className = 'sync-dot error';
    document.getElementById('sync-label').textContent = 'Connection error';
  });

  function formatDate(d) {
    if (!d) return '—';
    const parts = d.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }

  window.setFilter = function(f, el) {
    filter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  };

  window.render = function() {
    const search = document.getElementById('search').value.toLowerCase();
    const sort = document.getElementById('sortBy').value;
    const available = cars.filter(c => c.status === 'available').length;
    const rented = cars.filter(c => c.status === 'rented').length;

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-label">Total cars</div><div class="stat-val">${cars.length}</div></div>
      <div class="stat"><div class="stat-label">Available</div><div class="stat-val green">${available}</div></div>
      <div class="stat"><div class="stat-label">Rented out</div><div class="stat-val amber">${rented}</div></div>
    `;

    let list = cars.filter(c => {
      const matchFilter = filter === 'all' || c.status === filter;
      const matchSearch = (c.make + ' ' + c.model + ' ' + c.plate + ' ' + (c.renter||'')).toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    if (sort === 'name') list.sort((a,b) => (a.make+a.model).localeCompare(b.make+b.model));
    else if (sort === 'status') list.sort((a,b) => a.status.localeCompare(b.status));
    else if (sort === 'return') list.sort((a,b) => (a.returnDate||'9999').localeCompare(b.returnDate||'9999'));

    const el = document.getElementById('car-list');
    if (list.length === 0) {
      el.innerHTML = '<div class="empty">No cars found. Add your first car using the button above.</div>';
      return;
    }

    el.innerHTML = list.map(c => `
      <div class="car-card ${c.status}">
        <div class="car-top">
          <div>
            <div class="car-name">${c.year || ''} ${c.make} ${c.model}</div>
            <div class="car-plate">${c.plate || ''}</div>
          </div>
          <span class="badge ${c.status}">${c.status === 'available' ? 'Available' : 'Rented'}</span>
        </div>
        ${c.status === 'rented' ? `
        <div class="car-details">
          <span>Renter: <strong>${c.renter || '—'}</strong></span>
          <span>Phone: <strong>${c.phone || '—'}</strong></span>
          <span>Return: <strong>${formatDate(c.returnDate)}</strong></span>
        </div>` : ''}
        <div class="car-actions">
          ${c.status === 'available'
            ? `<button class="btn" onclick="openRentModal('${c.id}')">Mark as rented</button>`
            : `<button class="btn" onclick="markReturned('${c.id}')">Mark as returned</button>`}
          <button class="btn danger" onclick="removeCar('${c.id}')">Remove</button>
        </div>
      </div>
    `).join('');
  };

  window.openAddModal = function() {
    document.getElementById('a-make').value = '';
    document.getElementById('a-model').value = '';
    document.getElementById('a-year').value = '';
    document.getElementById('a-plate').value = '';
    document.getElementById('add-modal').classList.add('open');
  };

  window.closeModal = function(id) {
    document.getElementById(id).classList.remove('open');
  };

  window.addCar = async function() {
    const make = document.getElementById('a-make').value.trim();
    const model = document.getElementById('a-model').value.trim();
    const year = document.getElementById('a-year').value.trim();
    const plate = document.getElementById('a-plate').value.trim();
    if (!make || !model) { alert('Please enter at least a make and model.'); return; }
    setLoading();
    await addDoc(carsCol, { make, model, year, plate, status: 'available', renter: '', phone: '', returnDate: '' });
    closeModal('add-modal');
  };

  window.openRentModal = function(id) {
    rentingId = id;
    document.getElementById('r-name').value = '';
    document.getElementById('r-phone').value = '';
    document.getElementById('r-date').value = '';
    document.getElementById('rent-modal').classList.add('open');
  };

  window.confirmRent = async function() {
    if (!rentingId) return;
    const renter = document.getElementById('r-name').value.trim();
    const phone = document.getElementById('r-phone').value.trim();
    const returnDate = document.getElementById('r-date').value;
    setLoading();
    await updateDoc(doc(db, 'cars', rentingId), { status: 'rented', renter, phone, returnDate });
    closeModal('rent-modal');
    rentingId = null;
  };

  window.markReturned = async function(id) {
    setLoading();
    await updateDoc(doc(db, 'cars', id), { status: 'available', renter: '', phone: '', returnDate: '' });
  };

  window.removeCar = async function(id) {
    if (!confirm('Remove this car from the fleet?')) return;
    setLoading();
    await deleteDoc(doc(db, 'cars', id));
  };

  // Close modals on overlay click
  document.querySelectorAll('.overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });
</script>
</body>
</html>
