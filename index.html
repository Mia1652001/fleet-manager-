<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet — Fleet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="boot" id="boot">Loading...</div>

<!-- Login -->
<div class="login-wrap" id="login" style="display:none;">
  <div class="login-card">
    <h1>Fleet <em>Manager</em></h1>
    <div class="login-sub">Staff sign in</div>
    <div class="form-error" id="login-error"></div>
    <div class="field"><label>Email</label><input id="login-email" type="email" placeholder="you@company.com" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-primary" id="login-btn">Sign in</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none;">
  <header>
    <div class="header-top">
      <div>
        <h1>Fleet <em>Manager</em></h1>
        <div class="header-company" id="company-label">—</div>
      </div>
      <div class="header-right">
        <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Live</span></div>
        <button class="btn-logout" id="logout-btn">Sign out</button>
      </div>
    </div>
    <nav>
      <a href="index.html" class="active">Fleet</a>
      <a href="bookings.html">Bookings</a>
    </nav>
  </header>

  <div class="main">
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search car, plate, or renter...">
      <select id="sortBy">
        <option value="name">Sort: Name</option>
        <option value="status">Sort: Status</option>
      </select>
      <button class="btn-primary" id="add-car-btn">+ Add car</button>
    </div>

    <div class="filter-row" id="filters">
      <button class="tab active" data-f="all">All</button>
      <button class="tab" data-f="available">Available</button>
      <button class="tab" data-f="rented">Rented</button>
    </div>

    <div class="card-list" id="car-list"><div class="loading-screen">Loading fleet...</div></div>
  </div>
</div>

<!-- Add Car Modal -->
<div class="overlay" id="add-modal">
  <div class="modal">
    <h2>Add new car</h2>
    <div class="field"><label>Make</label><input id="a-make" placeholder="e.g. Toyota"></div>
    <div class="field"><label>Model</label><input id="a-model" placeholder="e.g. Corolla"></div>
    <div class="field"><label>Year</label><input id="a-year" placeholder="e.g. 2023" type="number"></div>
    <div class="field"><label>Plate number</label><input id="a-plate" placeholder="e.g. ABC-1234"></div>
    <div class="modal-actions">
      <button class="btn" data-close="add-modal">Cancel</button>
      <button class="btn-primary" id="save-car-btn">Add car</button>
    </div>
  </div>
</div>

<!-- Rent Modal -->
<div class="overlay" id="rent-modal">
  <div class="modal">
    <h2>Rent out car</h2>
    <div class="field"><label>Renter name</label><input id="r-name" placeholder="Full name"></div>
    <div class="field"><label>Phone number</label><input id="r-phone" placeholder="e.g. 5712 3456"></div>
    <div class="field"><label>Return date</label><input id="r-date" type="date"></div>
    <div class="modal-actions">
      <button class="btn" data-close="rent-modal">Cancel</button>
      <button class="btn-primary" id="confirm-rent-btn">Confirm rental</button>
    </div>
  </div>
</div>

<script type="module" src="js/fleet.js"></script>
</body>
</html>
