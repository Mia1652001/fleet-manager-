<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance — Fleet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="boot" id="boot">Loading...</div>

<div id="app" style="display:none;">
  <header>
    <div class="header-top">
      <div>
        <h1>Fleet <em>Manager</em></h1>
        <div class="header-company" id="company-label">—</div>
      </div>
      <div class="header-right">
        <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Live</span></div>
        <button class="btn-logout" id="logout-btn">Sign out</button>
      </div>
    </div>
    <nav>
      <a href="index.html">Fleet</a>
      <a href="bookings.html">Bookings</a>
      <a href="customers.html">Customers</a>
      <a href="billing.html">Billing</a>
      <a href="maintenance.html" class="active">Maintenance</a>
    </nav>
  </header>

  <div class="main">
    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search car or plate...">
    </div>

    <div class="filter-row" id="filters">
      <button class="tab active" data-f="all">All</button>
      <button class="tab" data-f="due">Service due</button>
      <button class="tab" data-f="service">Out of service</button>
    </div>

    <div class="card-list" id="car-list"><div class="loading-screen">Loading...</div></div>
  </div>
</div>

<!-- Maintenance Modal -->
<div class="overlay" id="maint-modal">
  <div class="modal">
    <h2 id="maint-title">Maintenance</h2>
    <div class="form-error" id="maint-error"></div>
    <div class="field"><label>Next service date</label><input id="m-service-date" type="date"></div>
    <div class="field"><label>Current mileage (km)</label><input id="m-mileage" type="number" min="0" placeholder="e.g. 45000"></div>
    <div class="field"><label>Service due at mileage (km)</label><input id="m-service-mileage" type="number" min="0" placeholder="e.g. 50000"></div>
    <div class="field"><label>Maintenance notes</label><input id="m-notes" placeholder="e.g. brake pads, oil change"></div>
    <div class="modal-actions">
      <button class="btn" data-close="maint-modal">Cancel</button>
      <button class="btn-primary" id="save-maint-btn">Save</button>
    </div>
  </div>
</div>

<script type="module" src="maintenance.js"></script>
</body>
</html>
